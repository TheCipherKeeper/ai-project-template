name: product-pipeline
on:
  pull_request:
    types: [opened, synchronize, reopened, labeled]
  pull_request_review:
    types: [submitted]

concurrency:
  group: product-pipeline-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  actions: read
  contents: read
  pull-requests: read

jobs:
  policy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
      - uses: actions/checkout@v4
        with:
          repository: ${{ vars.METHODOLOGY_REPOSITORY }}
          ref: ${{ vars.METHODOLOGY_VERSION }}
          path: .methodology-policy
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
      - name: Verify policy
        run: uv run .methodology-policy/tools/verify/verify.py --root ${{ github.workspace }} --methodology-ref "${{ vars.METHODOLOGY_VERSION }}" --commit "${{ github.event.pull_request.head.sha }}" ${{ contains(github.event.pull_request.labels.*.name, 'task-finalization') && format('--finalization-base {0}', github.event.pull_request.base.sha) || contains(github.event.pull_request.labels.*.name, 'task-qualification') && format('--qualification-base {0}', github.event.pull_request.base.sha) || '' }} --report verification.json
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: verification
          path: verification.json

  lint:
    needs: policy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
      - uses: actions/checkout@v4
        with:
          repository: ${{ vars.METHODOLOGY_REPOSITORY }}
          ref: ${{ vars.METHODOLOGY_VERSION }}
          path: .methodology-policy
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
      - name: Run lint
        if: ${{ !contains(github.event.pull_request.labels.*.name, 'task-finalization') && !contains(github.event.pull_request.labels.*.name, 'task-qualification') }}
        run: uv run .methodology-policy/tools/pipeline/run.py lint --commit "${{ github.event.pull_request.head.sha }}"
      - name: Product lint not applicable to service PR
        if: ${{ contains(github.event.pull_request.labels.*.name, 'task-finalization') || contains(github.event.pull_request.labels.*.name, 'task-qualification') }}
        run: echo "not_applicable"

  tests:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
      - uses: actions/checkout@v4
        with:
          repository: ${{ vars.METHODOLOGY_REPOSITORY }}
          ref: ${{ vars.METHODOLOGY_VERSION }}
          path: .methodology-policy
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
      - name: Run tests
        if: ${{ !contains(github.event.pull_request.labels.*.name, 'task-finalization') && !contains(github.event.pull_request.labels.*.name, 'task-qualification') }}
        run: uv run .methodology-policy/tools/pipeline/run.py tests --commit "${{ github.event.pull_request.head.sha }}"
      - name: Product tests not applicable to service PR
        if: ${{ contains(github.event.pull_request.labels.*.name, 'task-finalization') || contains(github.event.pull_request.labels.*.name, 'task-qualification') }}
        run: echo "not_applicable"

  review:
    needs: tests
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      REVIEWER: ${{ vars.AGENT_REVIEWER_LOGIN }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
      - uses: actions/checkout@v4
        with:
          repository: ${{ vars.METHODOLOGY_REPOSITORY }}
          ref: ${{ vars.METHODOLOGY_VERSION }}
          path: .methodology-policy
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
      - name: Read reviews
        if: ${{ !contains(github.event.pull_request.labels.*.name, 'task-finalization') && !contains(github.event.pull_request.labels.*.name, 'task-qualification') }}
        run: gh api "repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/reviews" > reviews.json
      - name: Verify independent approval
        if: ${{ !contains(github.event.pull_request.labels.*.name, 'task-finalization') && !contains(github.event.pull_request.labels.*.name, 'task-qualification') }}
        run: uv run .methodology-policy/tools/pipeline/run.py review --reviews reviews.json --reviewer "$REVIEWER" --author "${{ github.event.pull_request.user.login }}" --commit "${{ github.event.pull_request.head.sha }}"
      - name: Product review not applicable to service PR
        if: ${{ contains(github.event.pull_request.labels.*.name, 'task-finalization') || contains(github.event.pull_request.labels.*.name, 'task-qualification') }}
        run: echo "not_applicable"

  build:
    needs: review
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
      - uses: actions/checkout@v4
        with:
          repository: ${{ vars.METHODOLOGY_REPOSITORY }}
          ref: ${{ vars.METHODOLOGY_VERSION }}
          path: .methodology-policy
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
      - name: Build product
        if: ${{ !contains(github.event.pull_request.labels.*.name, 'task-finalization') && !contains(github.event.pull_request.labels.*.name, 'task-qualification') }}
        run: uv run .methodology-policy/tools/pipeline/run.py build --commit "${{ github.event.pull_request.head.sha }}"
      - uses: actions/upload-artifact@v4
        if: ${{ !contains(github.event.pull_request.labels.*.name, 'task-finalization') && !contains(github.event.pull_request.labels.*.name, 'task-qualification') }}
        with:
          name: build-${{ github.event.pull_request.head.sha }}
          path: .pipeline/product.zip
          include-hidden-files: true
      - name: Product build not applicable to service PR
        if: ${{ contains(github.event.pull_request.labels.*.name, 'task-finalization') || contains(github.event.pull_request.labels.*.name, 'task-qualification') }}
        run: echo "not_applicable"

  artifact:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
      - uses: actions/checkout@v4
        with:
          repository: ${{ vars.METHODOLOGY_REPOSITORY }}
          ref: ${{ vars.METHODOLOGY_VERSION }}
          path: .methodology-policy
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
      - uses: actions/download-artifact@v4
        if: ${{ !contains(github.event.pull_request.labels.*.name, 'task-finalization') && !contains(github.event.pull_request.labels.*.name, 'task-qualification') }}
        with:
          name: build-${{ github.event.pull_request.head.sha }}
          path: .pipeline
      - name: Record artifact digest
        if: ${{ !contains(github.event.pull_request.labels.*.name, 'task-finalization') && !contains(github.event.pull_request.labels.*.name, 'task-qualification') }}
        run: uv run .methodology-policy/tools/pipeline/run.py artifact --commit "${{ github.event.pull_request.head.sha }}"
      - uses: actions/upload-artifact@v4
        if: ${{ !contains(github.event.pull_request.labels.*.name, 'task-finalization') && !contains(github.event.pull_request.labels.*.name, 'task-qualification') }}
        with:
          name: product-${{ github.event.pull_request.head.sha }}
          path: |
            .pipeline/product.zip
            .pipeline/product.zip.sha256
            .pipeline/artifact.json
          include-hidden-files: true
      - name: Product artifact not applicable to service PR
        if: ${{ contains(github.event.pull_request.labels.*.name, 'task-finalization') || contains(github.event.pull_request.labels.*.name, 'task-qualification') }}
        run: echo "not_applicable"

  merge:
    needs: artifact
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      commit: ${{ steps.merge.outputs.commit }}
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      PR_URL: ${{ github.event.pull_request.html_url }}
    steps:
      - name: Squash merge
        run: gh pr merge "$PR_URL" --squash --delete-branch
      - id: merge
        name: Record merge commit
        run: |
          merge_commit="$(gh pr view "$PR_URL" --json mergeCommit --jq '.mergeCommit.oid')"
          test -n "$merge_commit"
          echo "commit=$merge_commit" >> "$GITHUB_OUTPUT"

  deploy:
    needs: merge
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      id-token: write
    environment: test
    env:
      DEPLOY_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.merge.outputs.commit }}
          fetch-depth: 0
      - uses: actions/checkout@v4
        with:
          repository: ${{ vars.METHODOLOGY_REPOSITORY }}
          ref: ${{ vars.METHODOLOGY_VERSION }}
          path: .methodology-policy
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
      - uses: actions/download-artifact@v4
        if: ${{ !contains(github.event.pull_request.labels.*.name, 'task-finalization') && !contains(github.event.pull_request.labels.*.name, 'task-qualification') }}
        with:
          name: product-${{ github.event.pull_request.head.sha }}
          path: .pipeline
      - name: Deploy merge commit
        if: ${{ !contains(github.event.pull_request.labels.*.name, 'task-finalization') && !contains(github.event.pull_request.labels.*.name, 'task-qualification') }}
        run: uv run .methodology-policy/tools/pipeline/run.py deploy --commit "${{ needs.merge.outputs.commit }}" --artifact .pipeline/product.zip
      - name: Product deploy not applicable to service PR
        if: ${{ contains(github.event.pull_request.labels.*.name, 'task-finalization') || contains(github.event.pull_request.labels.*.name, 'task-qualification') }}
        run: echo "not_applicable"
