# Системный файл Docker Compose: все сервисы программы + брокер + поставляемые в контейнерах
# автономные компоненты. CLI и другие неконтейнерные формы сюда не входят.
# Это НЕ локальный файл Docker Compose сервиса (тот содержит брокер + один сервис).
# Здесь — запуск всей программы вместе; образы сервисов собраны заранее.
# `build: context` на клон репозитория сервиса — только локальная отладка, не канон
# (канон — собранные образы; см. <methodology-repo>/docs/OPERATIONS.md).
#
# Скелет. Замени <...> под программу. Структура Docker Compose —
# <methodology-repo>/docs/OPERATIONS.md.

services:
  broker:
    # Один брокер на систему: Kafka / Redpanda / NATS. Пример — Redpanda.
    image: redpandadata/redpanda:latest
    command: redpanda start --overprovisioned --smp 1 --memory 1G
    ports:
      - "9092:9092"
    volumes:
      - broker-data:/var/lib/redpanda/data
    healthcheck:
      test: ["CMD", "rpk", "cluster", "health"]
      interval: 10s
      timeout: 5s
      retries: 5

  <service-a>:
    image: <registry>/<service-a>:<tag>      # собранный образ сервис-репо
    depends_on: [broker]
    env_file: .env                            # per-сервис конфиг (брокер-адрес, …)
    # внешние порты — только если принимает трафик снаружи

  <service-b>:
    image: <registry>/<service-b>:<tag>
    depends_on: [broker]
    env_file: .env

  <standalone-component>:
    image: <registry>/<standalone-component>:<tag>
    env_file: .env
    # брокер не добавляется в depends_on: автономный компонент не участник обмена
    # ports: ["<port>:<port>"]  # только для намеренно доступной поверхности

volumes:
  broker-data:
