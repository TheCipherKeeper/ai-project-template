# Локальная разработка: брокер + этот сервис. Процедура —
# Эксплуатация: <methodology-repo>/docs/OPERATIONS.md.
# Системный файл Docker Compose (все сервисы программы) — в хабе, не здесь.
#
# Скелет. Замени <...> под свой сервис и выбранный брокер (Kafka / Redpanda / NATS).

services:
  broker:
    # Выбери образ брокера: Kafka / Redpanda / NATS. Пример — Redpanda.
    image: redpandadata/redpanda:latest
    command: redpanda start --overprovisioned --smp 1 --memory 1G
    ports:
      - "9092:9092"     # клиентский порт брокера
    volumes:
      - broker-data:/var/lib/redpanda/data
    healthcheck:
      test: ["CMD", "rpk", "cluster", "health"]
      interval: 10s
      timeout: 5s
      retries: 5

  <service>:
    build: { context: . }          # Dockerfile в корне репо
    depends_on: [broker]
    env_file: .env
    # внешние порты — только если сервис принимает трафик снаружи:
    # ports: ["8080:8080"]

volumes:
  broker-data:
