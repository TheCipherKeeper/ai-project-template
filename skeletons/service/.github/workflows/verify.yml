name: verify
on: [pull_request, push]
jobs:
  policy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: ${{ vars.METHODOLOGY_REPOSITORY }}
          ref: ${{ vars.METHODOLOGY_VERSION }}
          path: .methodology-policy
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
      - run: uv run .methodology-policy/tools/verify/verify.py --root ${{ github.workspace }} --report verification.json
      - uses: actions/upload-artifact@v4
        if: always()
        with: { name: verification, path: verification.json }
