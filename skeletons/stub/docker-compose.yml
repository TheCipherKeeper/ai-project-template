# Локальная разработка: этот stub-контейнер-цель (БЕЗ брокера — stub не участник
# брокера). Процедура — <methodology-repo>/docs/guide/50-deploy.md,
# структура compose — <methodology-repo>/docs/refs/DEPLOYMENT.md.
# Системный compose (все сервисы + цели программы) — в хабе, не здесь.
#
# Скелет. Замени <...> под свой stub-таргет.

services:
  <stub>:
    build: { context: . }          # Dockerfile в корне репо
    env_file: .env
    ports:                          # пассивные сетевые поверхности stub-таргета
      - "<port>:<port>"            # открывать осознанно — это поверхности цели
    # брокера здесь НЕТ: stub не publish/consume топики

# volumes: (опц. — если stub хранит состояние)