# Локальная разработка при form=container: этот stub-контейнер (БЕЗ брокера — stub
# не участник брокера). Для прочих форм (cli, …) этот файл удаляется. Процедура —
# <methodology-repo>/docs/guide/50-deploy.md, структура compose —
# <methodology-repo>/docs/refs/DEPLOYMENT.md.
# Системный compose (все сервисы + цели программы) — в хабе, не здесь.
#
# Шаблон. Замените <...> под свой автономный компонент.

services:
  <stub>:
    build: { context: . }          # Dockerfile в корне репо
    env_file: .env
    ports:                          # сетевые поверхности автономного компонента
      - "<port>:<port>"            # открывать осознанно — это поверхности цели
    # брокера здесь НЕТ: stub не publish/consume топики

# volumes: (опц. — если stub хранит состояние)
