# Локальная разработка для формы `container`: автономный компонент в контейнере
# (БЕЗ брокера). Для прочих форм (`cli`, …) этот файл удаляется. Процедура —
# Эксплуатация: <methodology-repo>/docs/OPERATIONS.md.
# Системный файл Docker Compose (все сервисы и контейнерные автономные компоненты) — в хабе.
#
# Шаблон. Замените <...> под свой автономный компонент.

services:
  <standalone-component>:
    build: { context: . }          # Dockerfile в корне репо
    env_file: .env
    ports:                          # сетевые поверхности автономного компонента
      - "<port>:<port>"            # открывать осознанно — это поверхность компонента
    # брокера здесь НЕТ: компонент не публикует и не читает темы

# volumes: (опц. — если компонент хранит состояние)
