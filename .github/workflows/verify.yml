name: verify
on:
  pull_request:
  push:
    branches: [main]
jobs:
  methodology:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify methodology
        shell: pwsh
        run: ./tools/verify/verify.ps1 -Report verification.json
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: verification
          path: verification.json
